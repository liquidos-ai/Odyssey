services:
  odyssey:
    build:
      context: .
      dockerfile: Dockerfile
    # privileged: true #Need to add this for Bwrap sandbox to work
    image: odyssey-linux
    working_dir: /workspace
    command: bash
    init: true
    stdin_open: true
    tty: true
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
      - systempaths=unconfined
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8472:8472"
    volumes:
      - .:/workspace
